<!DOCTYPE html>
<html lang="en" data-page="admin">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WastePro Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-bar">
        <div class="brand-mark"></div>
        <div>
          <span class="brand-name">WastePro</span>
          <span class="brand-subtitle">Admin Panel</span>
        </div>
      </div>
      <div class="topbar-actions">
        <a class="button button--ghost" href="index.html">Home</a>
        <button class="button button--secondary" onclick="toggleNotifications()" id="notificationButton">Notifications <span id="notificationBadge" class="notification-badge">0</span></button>
        <select id="languageSelect" onchange="changeLanguage(this.value)">
          <option value="en">EN</option>
          <option value="hi">HI</option>
          <option value="kn">KN</option>
          <option value="te">TE</option>
          <option value="es">ES</option>
        </select>
      </div>
    </header>

    <section class="card">
      <div class="card__header">
        <h2 id="adminHeading">Admin Panel</h2>
        <p id="adminTips">Logged in as admin? Use this panel to review requests, complaints, and announcements.</p>
      </div>
      <div class="card__body admin-dashboard">
        <div class="admin-summary">
          <div>Users: <span id="adminUsersCount">0</span></div>
          <div>Pickups: <span id="adminPickupsCount">0</span></div>
          <div>Complaints: <span id="adminComplaintsCount">0</span></div>
          <div>Announcements: <span id="adminAnnouncementsCount">0</span></div>
        </div>

        <div class="admin-grid">
          <div class="admin-block">
            <h3>Active Pickup Requests</h3>
            <ul id="adminPickupList" class="pickup-list"></ul>
          </div>
          <div class="admin-block">
            <h3>Complaint Inbox</h3>
            <ul id="adminComplaintList" class="pickup-list"></ul>
          </div>
        </div>
      </div>
    </section>

    <div class="notification-panel hidden" id="notificationPanel">
      <h3 id="notificationHeading">Notifications</h3>
      <ul id="notificationList" class="pickup-list"></ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
